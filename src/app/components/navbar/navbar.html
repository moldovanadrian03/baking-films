<div id="navbar-container">
  <section class="navbar-row1">
    <img
      class="logo"
      src="assets/logo_square.png"
      alt="logo"
      (click)="scrollToById(CAROUSEL_SECTION)"
    />
    @if(isMobileView) {
      <button
        aria-label="Toggle sidenav"
        mat-icon-button
        class="sidenav-button"
        (click)="toggleSidenav()"
      >
        <mat-icon>menu</mat-icon>
      </button>
  }
  </section>
  @if(!isMobileView) {
    <section class="navbar-row2">
      <ul>
        <li (click)="scrollToById(ABOUT_SECTION)">
          Despre noi
        </li>
        <li (click)="scrollToById(CARDS_SECTION)">
          Echipa
        </li>
        <li (click)="scrollToById(CAROUSEL_SECTION)">
          Catalog
        </li>
        <li (click)="scrollToById(FOOTER_SECTION)">
          Contact
        </li>
      </ul>
    </section>
  }
  @if(isMobileView && isSidenavOpened) {
    <div class="backdrop" (click)="toggleSidenav()" ></div>

  }
  @if(isSidenavOpened) {
    <section class="sidenav-container">
      <ul>
        <li (click)="toggleSidenav()" (click)="scrollToById(ABOUT_SECTION)">
          Despre noi
        </li>
        <li (click)="toggleSidenav()" (click)="scrollToById(CARDS_SECTION)">
          Echipa
        </li>
        <li (click)="toggleSidenav()" (click)="scrollToById(CAROUSEL_SECTION)">
          Catalog
        </li>
        <li (click)="toggleSidenav()" (click)="scrollToById(FOOTER_SECTION)">
          Contact
        </li>
      </ul>
    </section>
  }
</div>
